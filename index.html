<!DOCTYPE html>
<html lang="en">
<head>
  <title>Bootstrap Image Styles</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

  <!-- JS -->
  <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>

  <style>
    body{
      background-color: #f5f5f5;
    }
  </style>
</head>

<body>

<div class="container mt-4">
  <h2>Rounded Corners</h2>
  <p>The .rounded class adds rounded corners:</p>
  <img src="rc.jpg" class="rounded" width="304" height="236">
</div>

<div class="container mt-4">
  <h2>Circle</h2>
  <p>The .rounded-circle class makes circle image:</p>
  <img src="circle.jpg" class="rounded-circle" width="304" height="236">
</div>

<div class="container mt-4">
  <h2>Thumbnail</h2>
  <p>The .img-thumbnail class creates thumbnail:</p>
  <img src="Thumbnail.jpg" class="img-thumbnail" width="304" height="236">
</div>

<div class="container mt-4">
  <h2>Aligning Images</h2>
  <p>Float left and right:</p>

  <img src="left.jpg" class="float-left mr-3" width="304" height="236">
  <img src="right.jpg" class="float-right" width="304" height="236">

  <!-- FIX: clear float -->
  <div class="clearfix"></div>
</div>

<div class="container mt-4 text-center">
  <h2>Centered Image</h2>
  <p>Using .mx-auto and .d-block:</p>

  <img src="center.jpg" class="mx-auto d-block" style="width:50%">
</div>

</body>
</html>
